<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/web/favicon.ico">
  <link rel="apple-touch-icon" href="/web/apple-touch-icon.png">
  <link rel="manifest" href="/web/manifest.json">
  <meta name="theme-color" content="#0A84FF">
  <title data-i18n="settings.title">系统设置</title>
  <link rel="stylesheet" href="/web/assets/css/styles.css?v=__VERSION__">
  <script defer src="/web/assets/locales/zh-CN.js?v=__VERSION__"></script>
  <script defer src="/web/assets/locales/en.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/i18n.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/template-engine.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/ui.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/settings.js?v=__VERSION__"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('ccload_theme') || 'light';
      document.documentElement.dataset.theme = savedTheme;
    })();
  </script>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="content-area">
        <div class="page-shell">
          <header class="page-section">
            <div class="glass-card page-header-card settings-page-header-card">
              <div class="page-header-main">
                <div class="page-header-copy">
                  <h1 class="page-title settings-page-title" data-i18n="settings.title">系统设置</h1>
                  <p class="page-subtitle settings-page-subtitle" data-i18n="settings.subtitle">系统偏好与运行参数配置</p>
                </div>
                <div class="page-header-actions settings-page-actions">
                  <button id="save-all-btn" class="btn btn-primary btn-md settings-save-button" data-i18n="settings.saveAll">
                    保存所有更改
                  </button>
                </div>
              </div>
            </div>
          </header>

          <section class="page-section">
            <div class="time-range-container page-toolbar-card settings-nav-card">
              <div id="settings-group-nav" class="time-range-selector settings-group-nav">
              </div>
            </div>
          </section>

          <section class="page-section">
            <div class="settings-groups" id="settings-groups">
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <template id="tpl-setting-row">
    <div class="settings-item" data-key="{{key}}" data-restart-required="{{restartRequired}}">
      <div class="settings-item-copy">
        <div class="settings-item-description">{{description}}</div>
        {{{restartBadgeHtml}}}
      </div>
      <div class="settings-item-control">{{{inputHtml}}}</div>
      <div class="settings-item-action">
        <button class="btn-icon setting-reset-btn" data-key="{{key}}" data-i18n-title="settings.resetToDefault" title="重置为默认值">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>
      </div>
    </div>
  </template>

  <template id="tpl-setting-group-row">
    <section id="settings-group-{{groupId}}" data-group="{{groupId}}" class="glass-card settings-group-card">
      <div class="settings-group-header">
        <h2 class="settings-group-title">{{groupName}}</h2>
      </div>
      <div class="settings-group-list" data-settings-group-body></div>
    </section>
  </template>

  <template id="tpl-setting-restart-badge">
    <span class="settings-restart-badge">需重启</span>
  </template>

</body>
</html>
