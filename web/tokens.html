<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/web/favicon.ico">
  <link rel="apple-touch-icon" href="/web/apple-touch-icon.png">
  <link rel="manifest" href="/web/manifest.json">
  <meta name="theme-color" content="#0A84FF">
  <title data-i18n="tokens.title">API令牌</title>
  <link rel="stylesheet" href="/web/assets/css/styles.css?v=__VERSION__">
  <link rel="stylesheet" href="/web/assets/css/tokens.css?v=__VERSION__">
  <script defer src="/web/assets/locales/zh-CN.js?v=__VERSION__"></script>
  <script defer src="/web/assets/locales/en.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/i18n.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/ui.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/template-engine.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/tokens.js?v=__VERSION__"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('ccload_theme') || 'light';
      document.documentElement.dataset.theme = savedTheme;
    })();
  </script>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="content-area page-shell tokens-page-shell">
        <header class="page-section">
          <div class="glass-card page-header-card tokens-page-header-card">
            <div class="page-header-main">
              <div class="page-header-copy">
                <h1 class="page-title tokens-page-title" data-i18n="tokens.title">API令牌</h1>
                <p class="page-subtitle tokens-page-subtitle" data-i18n="tokens.subtitle">管理用于 API (/v1/*) 访问的令牌</p>
              </div>
              <div class="page-header-actions">
                <button type="button" onclick="showCreateModal()" class="btn btn-primary btn-md" data-i18n="tokens.createToken">
                  + 创建令牌
                </button>
              </div>
            </div>
          </div>
        </header>

        <!-- 时间范围选择器 -->
        <section class="page-section">
          <div class="time-range-container page-toolbar-card tokens-toolbar-card">
            <div class="time-range-selector">
              <button class="time-range-btn active" data-range="today" data-i18n="index.timeRange.today">本日</button>
              <button class="time-range-btn" data-range="yesterday" data-i18n="index.timeRange.yesterday">昨日</button>
              <button class="time-range-btn" data-range="day_before_yesterday" data-i18n="index.timeRange.dayBeforeYesterday">前日</button>
              <button class="time-range-btn" data-range="this_week" data-i18n="index.timeRange.thisWeek">本周</button>
              <button class="time-range-btn" data-range="this_month" data-i18n="index.timeRange.thisMonth">本月</button>
              <button class="time-range-btn" data-range="last_month" data-i18n="index.timeRange.lastMonth">上月</button>
              <button class="time-range-btn" data-range="all" data-i18n="common.all">全部</button>
            </div>
          </div>
        </section>

        <section class="page-section">
          <!-- 令牌表格 -->
          <div class="glass-card page-content-card tokens-table-card">
            <div id="tokens-container" class="token-table"></div>
          </div>

          <!-- 空状态 -->
          <div id="empty-state" class="glass-card page-content-card tokens-empty-state">
            <div class="tokens-empty-state__icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                <circle cx="8.5" cy="12" r="4.5" stroke="currentColor" stroke-width="1.8"/>
                <path d="M12.8 12H21V14.6H19.2V16.4H17.4V14.6H15.6V13H12.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h3 class="mb-2 font-semibold" data-i18n="tokens.emptyTitle">暂无API令牌</h3>
            <p class="mb-6 opacity-80" data-i18n="tokens.emptyDesc">点击"创建令牌"按钮,生成第一个API访问令牌</p>
            <button type="button" onclick="showCreateModal()" class="btn btn-primary" data-i18n="tokens.createTokenBtn">创建令牌</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- 创建令牌对话框 -->
  <div id="createModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="createModalTitle">
    <div class="modal-content token-modal-content">
      <div class="modal-header">
        <h2 id="createModalTitle" class="modal-title" data-i18n="tokens.createModalTitle">创建API令牌</h2>
        <button type="button" class="close-btn" aria-label="关闭" onclick="closeCreateModal()">&times;</button>
      </div>
      <div class="modal-body token-modal-body">
        <div class="form-group">
          <label class="form-label" data-i18n="tokens.descriptionLabel">描述 *</label>
          <input type="text" id="tokenDescription" name="token_description" autocomplete="off" class="form-input" data-i18n-placeholder="tokens.descriptionPlaceholder" placeholder="请输入令牌用途描述" required>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="tokens.customTokenLabel">自定义令牌</label>
          <input type="text" id="customToken" name="custom_token" autocomplete="off" spellcheck="false" class="form-input" placeholder="留空则自动生成 (格式: sk-xxxxx)" data-i18n-placeholder="tokens.customTokenPlaceholder">
          <div class="token-form-hint" data-i18n="tokens.customTokenHint">留空则自动生成 48 位随机令牌</div>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="tokens.expiryLabel">过期时间</label>
          <select id="tokenExpiry" name="token_expiry" class="form-select">
            <option value="never" data-i18n="tokens.expiryNever">永不过期</option>
            <option value="30d" data-i18n="tokens.expiry30d">30天后过期</option>
            <option value="90d" data-i18n="tokens.expiry90d">90天后过期</option>
            <option value="180d" data-i18n="tokens.expiry180d">180天后过期</option>
            <option value="365d" data-i18n="tokens.expiry365d">1年后过期</option>
            <option value="custom" data-i18n="tokens.expiryCustom">自定义...</option>
          </select>
        </div>

        <div id="customExpiryContainer" style="display: none;" class="form-group">
          <label class="form-label" data-i18n="tokens.customExpiryLabel">自定义过期时间</label>
          <input type="datetime-local" id="customExpiry" name="custom_expiry" class="form-input">
        </div>

        <div class="form-group token-form-row">
          <label class="form-label token-form-row__label" data-i18n="tokens.costLimitLabel">费用上限</label>
          <div class="token-form-row__content token-form-currency">
            <span class="token-form-currency__prefix">$</span>
            <input type="number" id="tokenCostLimitUSD" name="token_cost_limit_usd" inputmode="decimal" class="form-input token-form-row__input" min="0" step="0.01" data-i18n-placeholder="tokens.costLimitPlaceholder" placeholder="0 表示无限制">
          </div>
        </div>

        <div class="form-group">
          <label class="token-checkbox-row">
            <input type="checkbox" id="tokenActive" name="token_active" checked class="token-checkbox-row__input">
            <span data-i18n="tokens.enableToken">启用令牌</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="closeCreateModal()" class="btn btn-secondary" data-i18n="common.cancel">取消</button>
        <button type="button" onclick="createToken()" class="btn btn-primary" data-i18n="tokens.createBtn">创建</button>
      </div>
    </div>
  </div>

  <!-- 显示新令牌对话框 -->
  <div id="tokenResultModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="tokenResultModalTitle">
    <div class="modal-content token-modal-content">
      <div class="modal-header">
        <h2 id="tokenResultModalTitle" class="modal-title" data-i18n="tokens.resultModalTitle">令牌创建成功</h2>
        <button type="button" class="close-btn" aria-label="关闭" onclick="closeTokenResultModal()">&times;</button>
      </div>
      <div class="modal-body token-modal-body">
        <div class="token-result-warning">
          <div class="token-result-warning__title" data-i18n="tokens.resultWarningTitle">⚠️ 重要提示:</div>
          <div class="token-result-warning__body" data-i18n="tokens.resultWarningDesc">
            请立即复制并保存此令牌。关闭此窗口后,您将无法再次查看完整令牌。
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="tokens.resultTokenLabel">API令牌(请妥善保管)</label>
          <div class="token-result-copy">
            <textarea id="newTokenValue" readonly class="form-input token-result-copy__input"></textarea>
            <button type="button" onclick="copyToken()" class="btn btn-secondary btn-compact token-action-btn token-action-copy token-result-copy__button" data-i18n="common.copy">
              复制
            </button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="closeTokenResultModal()" class="btn btn-primary" data-i18n="tokens.resultSavedBtn">我已保存</button>
      </div>
    </div>
  </div>

  <!-- 编辑令牌对话框 -->
  <div id="editModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="editModalTitle">
    <div class="modal-content token-modal-content token-edit-modal-content">
      <div class="modal-header">
        <h2 id="editModalTitle" class="modal-title" data-i18n="tokens.editModalTitle">编辑令牌</h2>
        <button type="button" class="close-btn" aria-label="关闭" onclick="closeEditModal()">&times;</button>
      </div>
      <div class="modal-body token-modal-body token-edit-modal-body">
        <input type="hidden" id="editTokenId" name="edit_token_id">

        <div class="form-group token-form-row">
          <label class="form-label token-form-row__label" data-i18n="tokens.editDescLabel">描述</label>
          <input type="text" id="editTokenDescription" name="edit_token_description" autocomplete="off" class="form-input token-form-row__input">
        </div>

        <div class="form-group token-form-row">
          <label class="form-label token-form-row__label" data-i18n="tokens.editTokenLabel">修改令牌</label>
          <div class="token-form-row__content">
            <input type="text" id="editTokenValue" name="edit_token_value" autocomplete="off" spellcheck="false" class="form-input token-form-row__input" placeholder="留空则保持当前令牌不变" data-i18n-placeholder="tokens.editTokenHint">
            <div class="token-form-hint" data-i18n="tokens.customTokenHint">留空则保持当前令牌不变</div>
          </div>
        </div>

        <div class="form-group token-form-row">
          <label class="form-label token-form-row__label" data-i18n="tokens.expiryLabel">过期时间</label>
          <select id="editTokenExpiry" name="edit_token_expiry" class="form-select token-form-row__input">
            <option value="never" data-i18n="tokens.expiryNever">永不过期</option>
            <option value="30d" data-i18n="tokens.expiry30d">30天后过期</option>
            <option value="90d" data-i18n="tokens.expiry90d">90天后过期</option>
            <option value="180d" data-i18n="tokens.expiry180d">180天后过期</option>
            <option value="365d" data-i18n="tokens.expiry365d">1年后过期</option>
            <option value="custom" data-i18n="tokens.expiryCustom">自定义...</option>
          </select>
        </div>

        <div id="editCustomExpiryContainer" class="form-group token-form-row token-form-row--toggle" style="display: none;">
          <label class="form-label token-form-row__label" data-i18n="tokens.customLabel">自定义</label>
          <input type="datetime-local" id="editCustomExpiry" name="edit_custom_expiry" class="form-input token-form-row__input">
        </div>

        <div class="form-group token-form-row">
          <label class="form-label token-form-row__label" data-i18n="tokens.costLimitLabel">费用上限</label>
          <div class="token-form-row__content token-form-currency">
            <span class="token-form-currency__prefix">$</span>
            <input type="number" id="editCostLimitUSD" name="edit_cost_limit_usd" inputmode="decimal" class="form-input token-form-row__input" min="0" step="0.01" data-i18n-placeholder="tokens.costLimitPlaceholder" placeholder="0 表示无限制">
            <span id="editCostUsedDisplay" class="token-form-inline-note"></span>
          </div>
        </div>

        <div class="form-group">
          <label class="token-checkbox-row">
            <input type="checkbox" id="editTokenActive" name="edit_token_active" class="token-checkbox-row__input">
            <span data-i18n="tokens.enableToken">启用令牌</span>
          </label>
        </div>

        <!-- 模型限制区域 -->
        <div class="form-group token-model-panel">
          <div class="token-model-panel__header">
            <label class="form-label token-model-panel__title">
              <span data-i18n="tokens.modelRestriction">模型限制</span> <span class="token-model-panel__count"><span data-i18n="tokens.modelCountPrefix">共</span> <span id="editAllowedModelsCount">0</span> <span data-i18n="tokens.modelCountSuffix">个模型（空表示允许所有）</span></span>
            </label>
            <div class="token-model-panel__actions">
              <button type="button" class="btn btn-secondary btn-xs" onclick="showModelSelectModal()" data-i18n-title="tokens.selectFromListTitle" title="从渠道模型列表中选择" data-i18n="tokens.selectFromList">
                + 从列表选择
              </button>
              <button type="button" class="btn btn-secondary btn-xs" onclick="showModelImportModal()" data-i18n-title="tokens.manualInputTitle" title="手动输入模型名称" data-i18n="tokens.manualInput">
                + 手动输入
              </button>
              <button type="button" id="batchDeleteAllowedModelsBtn" onclick="batchDeleteSelectedAllowedModels()" disabled
                class="btn btn-danger btn-xs" style="opacity: 0.5;" data-i18n="tokens.deleteSelected">
                删除选中
              </button>
            </div>
          </div>
          <div class="inline-table-container token-model-panel__table">
            <table class="inline-table token-model-table">
              <thead>
                <tr class="glass-card">
                  <th class="token-model-table__select">
                    <input type="checkbox" id="selectAllAllowedModels" onchange="toggleSelectAllAllowedModels(this.checked)">
                  </th>
                  <th class="token-model-table__name" data-i18n="tokens.modelName">模型名称</th>
                  <th class="token-model-table__actions"></th>
                </tr>
              </thead>
              <tbody id="allowedModelsTableBody">
                <!-- 动态渲染 -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="closeEditModal()" class="btn btn-secondary" data-i18n="common.cancel">取消</button>
        <button type="button" onclick="updateToken()" class="btn btn-primary" data-i18n="common.save">保存</button>
      </div>
    </div>
  </div>

  <!-- 模型选择对话框 -->
  <div id="modelSelectModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modelSelectModalTitle">
    <div class="modal-content token-modal-content token-modal-content--narrow">
      <div class="modal-header">
        <h2 id="modelSelectModalTitle" class="modal-title" data-i18n="tokens.selectModelTitle">选择模型</h2>
        <button type="button" class="close-btn" aria-label="关闭" onclick="closeModelSelectModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <input type="search" id="modelSearchInput" name="model_search" autocomplete="off" class="form-input" data-i18n-placeholder="tokens.searchModelPlaceholder" placeholder="搜索模型..." oninput="filterAvailableModels(this.value)">
        </div>
        <div id="selectAllContainer" class="glass-card token-select-all-card" style="display: none;">
          <label class="token-select-all-card__label">
            <input type="checkbox" id="selectAllModelsCheckbox" class="token-select-all-card__input" onchange="toggleSelectAllModels(this.checked)">
            <span data-i18n="tokens.selectAllCurrent">全选当前列表</span>
            <span id="visibleModelsCount" class="token-select-all-card__count"></span>
          </label>
        </div>
        <div id="availableModelsContainer" class="token-available-models">
          <!-- 动态渲染可选模型列表 -->
        </div>
        <div class="token-modal-counter">
          <span data-i18n="tokens.selectedPrefix">已选择</span> <span id="selectedModelsCount">0</span> <span data-i18n="tokens.selectedSuffix">个模型</span>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="closeModelSelectModal()" class="btn btn-secondary" data-i18n="common.cancel">取消</button>
        <button type="button" onclick="confirmModelSelection()" class="btn btn-primary" data-i18n="tokens.confirmAdd">确定添加</button>
      </div>
    </div>
  </div>

  <!-- 批量导入模型对话框 -->
  <div id="modelImportModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modelImportModalTitle">
    <div class="modal-content token-modal-content token-modal-content--wide">
      <div class="modal-header">
        <h2 id="modelImportModalTitle" class="modal-title" data-i18n="tokens.importModelTitle">手动输入模型</h2>
        <button type="button" class="close-btn" aria-label="关闭" onclick="closeModelImportModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group token-import-group">
          <label class="form-label token-import-group__label"><span data-i18n="tokens.inputModelLabel">输入模型名称</span> <span class="token-import-group__hint" data-i18n="tokens.inputModelHint">(支持逗号或换行分隔)</span></label>
          <textarea
            id="tokenModelImportTextarea"
            class="form-input token-import-textarea"
            rows="8"
            name="token_model_import"
            placeholder="gpt-4o,gpt-4o-mini&#10;claude-3-5-sonnet-20241022&#10;claude-3-5-haiku-latest"
            oninput="updateModelImportPreview()"
          ></textarea>
        </div>
        <div class="glass-card rounded mb-3">
          <strong data-i18n="tokens.importTipTitle">提示：</strong><span data-i18n="tokens.importTipDesc">支持逗号分隔 <code style="background: rgba(128,128,128,0.15); padding: 2px 4px; border-radius: 3px;">model1,model2</code> 或每行一个模型，自动去重</span>
        </div>
        <div id="tokenModelImportPreview" class="token-import-preview" style="display: none;">
          <span data-i18n="tokens.willAddPrefix">将添加</span> <span id="tokenModelImportCount">0</span> <span data-i18n="tokens.willAddSuffix">个模型</span>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="closeModelImportModal()" class="btn btn-secondary" data-i18n="common.cancel">取消</button>
        <button type="button" onclick="confirmModelImport()" class="btn btn-primary" data-i18n="tokens.confirmAdd">确定添加</button>
      </div>
    </div>
  </div>

  <!-- 令牌行模板 -->
  <template id="tpl-token-row">
    <tr data-token-id="{{id}}">
      <td style="font-weight: 500;">{{description}}</td>
      <td>
        <div><span class="token-display token-display-{{statusClass}}">{{maskedToken}}</span></div>
        <div style="font-size: 12px; color: var(--neutral-500); margin-top: 4px;">{{createdAt}}{{createdLabel}} · {{expiresAt}}</div>
      </td>
      <td style="text-align: center;">{{{callsHtml}}}</td>
      <td style="text-align: center;">{{{successRateHtml}}}</td>
      <td style="text-align: center;">{{{rpmHtml}}}</td>
      <td style="text-align: center;">{{{tokensHtml}}}</td>
      <td style="text-align: center;">{{{costHtml}}}</td>
      <td style="text-align: center;">{{{streamAvgHtml}}}</td>
      <td style="text-align: center;">{{{nonStreamAvgHtml}}}</td>
      <td style="color: var(--neutral-600);">{{lastUsed}}</td>
      <td style="white-space: nowrap;">
        <button type="button" class="btn-copy-token btn btn-secondary btn-compact token-action-btn token-action-copy" style="margin-right: 4px;" data-token="{{token}}" data-i18n="common.copy">复制</button>
        <button type="button" class="btn btn-secondary btn-edit btn-compact token-action-btn token-action-edit" style="margin-right: 4px;" data-i18n="common.edit">编辑</button>
        <button type="button" class="btn btn-danger btn-delete btn-compact" data-i18n="common.delete">删除</button>
      </td>
    </tr>
  </template>

  <!-- 统计徽章组件(可复用) -->
  <template id="tpl-stats-badge">
    <span class="stats-badge" style="{{style}}" title="{{title}}">{{text}}</span>
  </template>

</body>
</html>
