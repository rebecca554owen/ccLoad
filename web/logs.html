<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/web/favicon.ico">
  <link rel="apple-touch-icon" href="/web/apple-touch-icon.png">
  <link rel="manifest" href="/web/manifest.json">
  <meta name="theme-color" content="#0A84FF">
  <title data-i18n="logs.title">请求日志</title>
  <link rel="stylesheet" href="/web/assets/css/styles.css?v=__VERSION__">
  <link rel="stylesheet" href="/web/assets/css/channels.css?v=__VERSION__">
  <link rel="stylesheet" href="/web/assets/css/logs.css?v=__VERSION__">
  <script defer src="/web/assets/locales/zh-CN.js?v=__VERSION__"></script>
  <script defer src="/web/assets/locales/en.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/i18n.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/template-engine.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/date-range-selector.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/ui.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/logs.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/logs-channel-editor.js?v=__VERSION__"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('ccload_theme') || 'light';
      document.documentElement.dataset.theme = savedTheme;
    })();
  </script>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="content-area">
        <div class="page-shell">
        <header class="page-section">
          <div class="glass-card page-header-card">
            <div class="page-header-main">
              <div class="page-header-copy">
                <h1 class="page-title" data-i18n="logs.title">请求日志</h1>
                <p class="page-subtitle" data-i18n="logs.subtitle">请调整筛选条件或检查时间范围</p>
              </div>
            </div>
          </div>
        </header>

        <section class="page-section">
        <div class="filter-bar glass-panel page-toolbar-card">
          <div class="filter-controls logs-filter-controls">
            <div class="filter-group logs-filter-group logs-filter-group--compact logs-filter-group--select-sm">
              <label for="f_channel_type" class="filter-label" data-i18n="stats.channelType">渠道类型</label>
              <select id="f_channel_type" class="form-select">
              </select>
            </div>

            <div class="filter-group logs-filter-group logs-filter-group--compact logs-filter-group--select-sm">
              <label for="f_hours" class="filter-label" data-i18n="stats.timeRange">时间范围</label>
              <select id="f_hours" class="form-select">
              </select>
            </div>

            <div class="filter-group logs-filter-group logs-filter-group--compact logs-filter-group--input-xs">
              <label for="f_id" class="filter-label" data-i18n="stats.channelId">渠道ID</label>
              <input type="number" id="f_id" class="filter-input" data-i18n-placeholder="stats.inputIdPlaceholder" placeholder="输入ID...">
            </div>

            <div class="filter-group logs-filter-group logs-filter-group--compact logs-filter-group--input-md">
              <label for="f_name" class="filter-label" data-i18n="stats.channelName">渠道名</label>
              <input type="text" id="f_name" class="filter-input" data-i18n-placeholder="stats.containsTextPlaceholder" placeholder="包含文本...">
            </div>

            <div class="filter-group logs-filter-group logs-filter-group--compact logs-filter-group--input-md">
              <label for="f_model" class="filter-label" data-i18n="common.model">模型</label>
              <input type="text" id="f_model" class="filter-input" data-i18n-placeholder="stats.containsTextPlaceholder" placeholder="包含文本...">
            </div>

            <div class="filter-group logs-filter-group logs-filter-group--compact logs-filter-group--select-sm">
              <label for="f_result_type" class="filter-label" data-i18n="logs.resultType">请求结果</label>
              <select id="f_result_type" class="form-select">
                <option value="all" data-i18n="logs.resultAll">全部</option>
                <option value="success" data-i18n="logs.resultSuccess">成功(2xx)</option>
                <option value="error" data-i18n="logs.resultError">错误(非2xx)</option>
              </select>
            </div>

            <div class="filter-group logs-filter-group logs-filter-group--compact logs-filter-group--input-xs">
              <label for="f_status" class="filter-label" data-i18n="logs.statusCode">状态码</label>
              <input type="number" id="f_status" class="filter-input" data-i18n-placeholder="logs.statusPlaceholder" placeholder="如 200 / 403">
            </div>

            <div class="filter-group logs-filter-group logs-filter-group--compact logs-filter-group--select-md">
              <label for="f_auth_token" class="filter-label" data-i18n="stats.token">令牌</label>
              <select id="f_auth_token" class="form-select">
                <option value="" data-i18n="stats.allTokens">全部令牌</option>
              </select>
            </div>

            <div class="filter-info logs-filter-info">
              <span data-i18n="logs.showPrefix">显示</span><span id="displayedCount">0</span>/<span id="totalCount">0</span><span data-i18n="logs.recordsSuffix">条</span>
            </div>

            <div class="logs-filter-actions">
              <button id="btn_filter" type="button" class="btn btn-primary btn-md" data-i18n="common.filter">筛选</button>
            </div>
          </div>
        </div>
        </section>

        <section class="page-section">
          <div class="glass-card page-content-card page-content-card--flush" style="animation-delay: 0.2s;">
            <div class="table-container logs-table-shell">
              <table class="modern-table logs-table">
                <thead>
                  <tr>
                    <th data-i18n="logs.colTime">时间</th>
                    <th data-i18n="logs.colIP">IP</th>
                    <th data-i18n="logs.colApiKey">API Key</th>
                    <th data-i18n="logs.colChannel">渠道</th>
                    <th data-i18n="common.model">模型</th>
                    <th data-i18n="logs.statusCode">状态码</th>
                    <th data-i18n="logs.colTiming">首字/耗时(秒)</th>
                    <th data-i18n="logs.colInput">输入</th>
                    <th data-i18n="logs.colOutput">输出</th>
                    <th data-i18n="logs.colCacheRead">缓存读</th>
                    <th data-i18n="logs.colCacheWrite">缓存建</th>
                    <th data-i18n="logs.colCost">成本</th>
                    <th data-i18n="logs.colMessage">信息</th>
                  </tr>
                </thead>
                <tbody id="tbody">
                  <tr>
                    <td colspan="13" class="loading-state">
                      <div class="loading-spinner" style="margin: 0 auto var(--space-2)"></div>
                      <span data-i18n="logs.loading">正在加载日志...</span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div id="logsActiveCards" class="logs-cards logs-cards-active"></div>
            <div id="logsCards" class="logs-cards"></div>
          </div>
        </section>

        <section class="page-section">
          <div class="glass-card page-footer-card">
            <div class="flex justify-center items-center">
              <div class="pagination-controls logs-pagination-controls">
                <button id="logs_prev2" class="btn btn-secondary btn-sm" onclick="prevLogsPage()">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                  </svg>
                  <span data-i18n="common.prevPage">上一页</span>
                </button>
                <span class="pagination-info logs-pagination-info" style="display: flex; align-items: center; gap: var(--space-2);">
                  <span data-i18n="logs.pagePrefix">第</span> <span id="logs_current_page2">1</span> <span data-i18n="logs.pageMid">页，共</span> <span id="logs_total_pages2">1</span> <span data-i18n="logs.pageSuffix">页</span>
                  <span style="margin-left: var(--space-2);">|</span>
                  <span data-i18n="logs.jumpTo">跳转到</span>
                  <input
                    type="number"
                    id="logs_jump_page"
                    class="form-input logs-jump-input"
                    min="1"
                    max="1"
                    data-i18n-placeholder="logs.pagePlaceholder"
                    placeholder="页码"
                    style="width: 100px; opacity: 0.7;"
                    onkeydown="if(event.key==='Enter') jumpToPage()"
                  />
                  <span data-i18n="logs.pageUnit">页</span>
                </span>
                <button id="logs_next2" class="btn btn-secondary btn-sm" onclick="nextLogsPage()">
                  <span data-i18n="common.nextPage">下一页</span>
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </section>
        </div>
      </div>
    </main>
  </div>

  <!-- 测试 API Key 模态框 -->
  <div id="testKeyModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="testKeyModalTitle">
    <div class="modal-content test-modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="testKeyModalTitle"><span data-i18n="logs.testKeyTitle">测试 API Key</span> - <span id="testKeyChannelName"></span></h2>
        <button type="button" class="close-btn" aria-label="关闭" onclick="closeTestKeyModal()">&times;</button>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="logs.apiKeyLabel">API Key</label>
        <code id="testKeyDisplay" class="glass-card rounded p-2 opacity-90" style="display: block;"></code>
        <small id="testKeyIndexInfo" class="opacity-75 text-sm" style="display: block; margin-top: 6px;"></small>
      </div>

      <div class="form-group">
        <label class="form-label" for="testKeyModel" data-i18n="logs.testModel">测试模型</label>
        <select id="testKeyModel" name="test_key_model" class="form-select">
          <option value="" data-i18n="common.loading">加载中...</option>
        </select>
        <small class="opacity-75 text-sm" style="margin-top: 4px; display: block;">
          <span data-i18n="logs.originalModel">日志中的模型:</span> <code id="testKeyOriginalModel" class="opacity-75"></code>
        </small>
      </div>

      <div class="form-group">
        <label class="form-label" for="testKeyContent" data-i18n="logs.testContent">测试内容</label>
        <input type="text" id="testKeyContent" name="test_key_content" autocomplete="off" class="form-input" data-i18n-placeholder="logs.testContentPlaceholder" placeholder="输入测试消息内容">
      </div>

      <div class="form-group">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="testKeyStream" name="test_key_stream" checked>
          <span class="form-label" style="margin: 0;" data-i18n="logs.enableStream">启用流式响应</span>
        </label>
      </div>

      <!-- 测试进度 -->
      <div id="testKeyProgress" class="test-progress">
        <div class="loading-spinner"></div>
        <p data-i18n="logs.testingKey">正在测试 API Key...</p>
      </div>

      <!-- 测试结果 -->
      <div id="testKeyResult" class="test-result">
        <div id="testKeyResultContent"></div>
        <div id="testKeyResultDetails" class="test-details"></div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="closeTestKeyModal()" data-i18n="common.close">关闭</button>
        <button type="button" id="runKeyTestBtn" class="btn btn-primary" onclick="runKeyTest()" data-i18n="logs.startTest">开始测试</button>
      </div>
    </div>
  </div>


  <!-- 日志表格行模板 -->
  <template id="tpl-log-row">
    <tr>
      <td style="white-space: nowrap;">{{time}}</td>
      <td class="config-info opacity-75" style="white-space: nowrap; font-family: monospace; font-size: 0.85em;">{{{clientIPDisplay}}}</td>
      <td style="text-align: center; white-space: nowrap;">{{{apiKeyDisplay}}}</td>
      <td class="config-info">{{{configDisplay}}}</td>
      <td>{{{modelDisplay}}}</td>
      <td><span class="{{statusClass}}">{{statusCode}}</span></td>
      <td style="text-align: right; white-space: nowrap;">{{{responseTimingDisplay}}}</td>
      <td style="text-align: right; white-space: nowrap;">{{{inputTokensDisplay}}}</td>
      <td style="text-align: right; white-space: nowrap;">{{{outputTokensDisplay}}}</td>
      <td style="text-align: right; white-space: nowrap;">{{{cacheReadDisplay}}}</td>
      <td style="text-align: right; white-space: nowrap;">{{{cacheCreationDisplay}}}</td>
      <td style="text-align: right; white-space: nowrap;">{{{costDisplay}}}</td>
      <td style="max-width: 300px; word-break: break-word;">{{message}}</td>
    </tr>
  </template>

  <!-- 空状态模板 -->
  <template id="tpl-log-empty">
    <tr>
      <td colspan="{{colspan}}" class="empty-state">
        <svg class="w-12 h-12 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <div class="opacity-75" style="font-weight: var(--font-medium); margin-bottom: var(--space-1);" data-i18n="logs.noData">暂无日志数据</div>
        <div data-i18n="logs.adjustFilter">请调整筛选条件或检查时间范围</div>
      </td>
    </tr>
  </template>

  <!-- 加载状态模板 -->
  <template id="tpl-log-loading">
    <tr>
      <td colspan="{{colspan}}" class="loading-state">
        <div class="loading-spinner" style="margin: 0 auto var(--space-2)"></div>
        <span data-i18n="logs.loading">正在加载日志...</span>
      </td>
    </tr>
  </template>

  <!-- 错误状态模板 -->
  <template id="tpl-log-error">
    <tr>
      <td colspan="{{colspan}}" class="empty-state">
        <svg class="w-12 h-12 mx-auto mb-4" style="color: var(--error-400);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.864-.833-2.634 0L4.18 16.5c-.77.833.192 2.5 1.732 2.5z"/>
        </svg>
        <div style="color: var(--error-400); font-weight: var(--font-medium); margin-bottom: var(--space-1);" data-i18n="logs.loadFailed">加载失败</div>
        <div data-i18n="logs.checkNetwork">请检查网络连接或重试</div>
      </td>
    </tr>
  </template>

</body>
</html>
