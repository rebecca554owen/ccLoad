<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/web/favicon.ico">
  <link rel="apple-touch-icon" href="/web/apple-touch-icon.png">
  <link rel="manifest" href="/web/manifest.json">
  <meta name="theme-color" content="#0A84FF">
  <title data-i18n="stats.title">调用统计</title>
  <link rel="stylesheet" href="/web/assets/css/styles.css?v=__VERSION__">
  <link rel="stylesheet" href="/web/assets/css/channels.css?v=__VERSION__">
  <script defer src="/web/assets/locales/zh-CN.js?v=__VERSION__"></script>
  <script defer src="/web/assets/locales/en.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/i18n.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/echarts.min.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/template-engine.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/date-range-selector.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/ui.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/stats.js?v=__VERSION__"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('ccload_theme') || 'light';
      document.documentElement.dataset.theme = savedTheme;
    })();
  </script>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="content-area">
        <div class="page-shell">
        <header class="page-section">
          <div class="glass-card page-header-card analytics-page-header-card">
            <div class="page-header-main">
              <div class="page-header-copy">
                <h1 class="page-title" data-i18n="stats.title">调用统计</h1>
                <p class="page-subtitle analytics-page-subtitle" data-i18n="stats.subtitle">查看渠道、模型与令牌维度的调用统计</p>
              </div>
            </div>
          </div>
        </header>

        <section class="page-section">
        <div class="filter-bar page-toolbar-card analytics-filter-card">
          <div class="filter-controls">
            <div class="filter-group">
              <label for="f_channel_type" class="filter-label" data-i18n="stats.channelType">渠道类型</label>
              <select id="f_channel_type" class="form-select analytics-filter-select analytics-filter-select--type">
              </select>
            </div>

            <div class="filter-group">
              <label for="f_hours" class="filter-label" data-i18n="stats.timeRange">时间范围</label>
              <select id="f_hours" class="form-select analytics-filter-select">
              </select>
            </div>

            <div class="filter-group analytics-filter-group--id">
              <label for="f_id" class="filter-label" data-i18n="stats.channelId">渠道ID</label>
              <input type="number" id="f_id" class="filter-input" data-i18n-placeholder="stats.inputIdPlaceholder" placeholder="输入ID...">
            </div>

            <div class="filter-group">
              <label for="f_name" class="filter-label" data-i18n="stats.channelName">渠道名</label>
              <input type="text" id="f_name" class="filter-input" data-i18n-placeholder="stats.containsTextPlaceholder" placeholder="包含文本...">
            </div>

            <div class="filter-group">
              <label for="f_model" class="filter-label" data-i18n="common.model">模型</label>
              <input type="text" id="f_model" class="filter-input" data-i18n-placeholder="stats.containsTextPlaceholder" placeholder="包含文本...">
            </div>

            <div class="filter-group">
              <label for="f_auth_token" class="filter-label" data-i18n="stats.token">令牌</label>
              <select id="f_auth_token" class="form-select analytics-filter-select analytics-filter-select--token">
                <option value="" data-i18n="stats.allTokens">全部令牌</option>
              </select>
            </div>

            <div class="filter-group analytics-filter-group--checkbox">
              <label class="filter-checkbox-label">
                <input type="checkbox" id="f_hide_zero_success" checked>
                <span data-i18n="stats.hideZeroSuccess">隐藏0成功</span>
              </label>
            </div>

            <div class="filter-info analytics-filter-info">
              <span data-i18n="stats.totalRecordsPrefix">共</span> <span id="statsCount">0</span> <span data-i18n="stats.totalRecordsSuffix">条记录</span>
            </div>

            <div class="analytics-filter-actions">
              <button id="btn_filter" type="button" class="btn btn-primary btn-md" data-i18n="common.filter">筛选</button>
            </div>
          </div>
        </div>
        </section>

        <section class="page-section">
	          <div class="glass-card page-content-card analytics-content-card stats-detail-card" style="animation-delay: 0.3s;">
            <h3 class="section-title analytics-section-header mb-6">
              <span class="analytics-section-title">
                <svg class="inline-block w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                <span data-i18n="stats.detailTitle">详细统计数据</span>
                <small class="opacity-75 analytics-section-note" data-i18n="stats.sortByPriority">
                  按渠道优先级排序
                </small>
              </span>
              <div class="view-toggle-group" id="view-toggle-group">
                <button type="button" class="view-toggle-btn active" data-view="table" onclick="switchView('table')">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                  </svg>
                  <span data-i18n="stats.viewTable">表格</span>
                </button>
                <button type="button" class="view-toggle-btn" data-view="chart" onclick="switchView('chart')">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/>
                  </svg>
                  <span data-i18n="stats.viewChart">图表</span>
                </button>
              </div>
            </h3>
            
            <!-- 统计表格 -->
            <script>
              // 立即恢复视图状态，避免闪烁
              (function() {
                try {
                  var savedView = localStorage.getItem('stats.view');
                  if (savedView === 'chart') {
                    document.write('<style id="stats-view-init-style">#stats-table-view{display:none}#stats-chart-view{display:block}.view-toggle-btn[data-view="table"]{background:transparent;color:var(--neutral-600);box-shadow:none}.view-toggle-btn[data-view="chart"]{background:linear-gradient(135deg,var(--primary-500),var(--primary-600));color:#fff;box-shadow:0 6px 18px rgba(37,99,235,0.28)}</style>');
                  }
                } catch(_) {}
              })();
            </script>
            <div class="table-container" id="stats-table-view">
              <table class="modern-table stats-table">
                <thead>
                  <tr>
                    <th class="sortable" data-column="channel_name" onclick="sortTable('channel_name')">
                      <span data-i18n="stats.channelName">渠道名称</span>
                      <span class="sort-indicator" id="sort-channel_name"></span>
                    </th>
                    <th class="sortable" data-column="model" onclick="sortTable('model')">
                      <span data-i18n="common.model">模型</span>
                      <span class="sort-indicator" id="sort-model"></span>
                    </th>
                    <th class="sortable" data-column="success" onclick="sortTable('success')" style="color: var(--success-400);">
                      <span data-i18n="common.success">成功</span>
                      <span class="sort-indicator" id="sort-success"></span>
                    </th>
                    <th class="sortable" data-column="error" onclick="sortTable('error')" style="color: var(--error-400);">
                      <span data-i18n="common.failed">失败</span>
                      <span class="sort-indicator" id="sort-error"></span>
                    </th>
                    <th class="sortable" data-column="avg_first_byte_time" onclick="sortTable('avg_first_byte_time')">
                      <span data-i18n="stats.avgFirstByte">平均首字/耗时(秒)</span>
                      <span class="sort-indicator" id="sort-avg_first_byte_time"></span>
                    </th>
                    <th class="sortable" data-column="rpm" onclick="sortTable('rpm')" data-i18n-title="stats.rpmTitle" title="每分钟请求数(峰值/平均/最近)">
                      <span data-i18n="stats.rpm">RPM(峰/均/近)</span>
                      <span class="sort-indicator" id="sort-rpm"></span>
                    </th>
                    <th class="sortable" data-column="total_input_tokens" onclick="sortTable('total_input_tokens')">
                      <span data-i18n="stats.inputTokens">输入Token</span>
                      <span class="sort-indicator" id="sort-total_input_tokens"></span>
                    </th>
                    <th class="sortable" data-column="total_output_tokens" onclick="sortTable('total_output_tokens')">
                      <span data-i18n="stats.outputTokens">输出Token</span>
                      <span class="sort-indicator" id="sort-total_output_tokens"></span>
                    </th>
                    <th class="sortable" data-column="total_cache_read" onclick="sortTable('total_cache_read')" style="color: var(--success-600);">
                      <span data-i18n="stats.cacheRead">缓存读取</span>
                      <span class="sort-indicator" id="sort-total_cache_read"></span>
                    </th>
                    <th class="sortable" data-column="total_cache_creation" onclick="sortTable('total_cache_creation')" style="color: var(--primary-600);">
                      <span data-i18n="stats.cacheCreation">缓存创建</span>
                      <span class="sort-indicator" id="sort-total_cache_creation"></span>
                    </th>
                    <th class="sortable" data-column="total_cost" onclick="sortTable('total_cost')" style="color: var(--warning-600);">
                      <span data-i18n="stats.costUsd">成本($)</span>
                      <span class="sort-indicator" id="sort-total_cost"></span>
                    </th>
                  </tr>
                </thead>
                <tbody id="stats_tbody">
                  <tr>
                    <td colspan="12" class="loading-state">
                      <div class="loading-spinner" style="margin: 0 auto var(--space-2)"></div>
                      <span data-i18n="stats.loading">正在加载统计数据...</span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- 图表视图 -->
            <div id="stats-chart-view" style="display: none;">
              <div class="charts-grid">
                <!-- 第1行：调用次数 -->
                <!-- 渠道调用次数饼图 -->
                <div class="chart-card">
                  <h4 class="chart-title" data-i18n="stats.chartChannelCalls">渠道调用次数</h4>
                  <div id="chart-channel-calls" class="pie-chart-container"></div>
                </div>
                <!-- 模型调用次数饼图 -->
                <div class="chart-card">
                  <h4 class="chart-title" data-i18n="stats.chartModelCalls">模型调用次数</h4>
                  <div id="chart-model-calls" class="pie-chart-container"></div>
                </div>
                <!-- 第2行：成本 -->
                <!-- 渠道成本饼图 -->
                <div class="chart-card">
                  <h4 class="chart-title" data-i18n="stats.chartChannelCost">渠道成本</h4>
                  <div id="chart-channel-cost" class="pie-chart-container"></div>
                </div>
                <!-- 模型成本饼图 -->
                <div class="chart-card">
                  <h4 class="chart-title" data-i18n="stats.chartModelCost">模型成本</h4>
                  <div id="chart-model-cost" class="pie-chart-container"></div>
                </div>
                <!-- 第3行：Token用量 -->
                <!-- 渠道Token用量饼图 -->
                <div class="chart-card">
                  <h4 class="chart-title" data-i18n="stats.chartChannelTokens">渠道Token用量</h4>
                  <div id="chart-channel-tokens" class="pie-chart-container"></div>
                </div>
                <!-- 模型Token用量饼图 -->
                <div class="chart-card">
                  <h4 class="chart-title" data-i18n="stats.chartModelTokens">模型Token用量</h4>
                  <div id="chart-model-tokens" class="pie-chart-container"></div>
                </div>
              </div>
            </div>
          </div>
        </section>
        </div>
      </div>
    </main>
  </div>

  <!-- 加载状态模板 -->
  <template id="tpl-stats-loading">
    <tr>
      <td colspan="{{colspan}}" class="loading-state">
        <div class="loading-spinner" style="margin: 0 auto var(--space-2)"></div>
        <span data-i18n="stats.loading">正在加载统计数据...</span>
      </td>
    </tr>
  </template>

  <!-- 错误状态模板 -->
  <template id="tpl-stats-error">
    <tr>
      <td colspan="{{colspan}}" class="empty-state">
        <svg class="w-12 h-12 mx-auto mb-4" style="color: var(--error-400);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.864-.833-2.634 0L4.18 16.5c-.77.833.192 2.5 1.732 2.5z"/>
        </svg>
        <div style="color: var(--error-400); font-weight: var(--font-medium); margin-bottom: var(--space-1);" data-i18n="stats.loadFailed">加载失败</div>
        <div data-i18n="stats.checkNetwork">请检查网络连接或重试</div>
      </td>
    </tr>
  </template>

  <!-- 空数据状态模板 -->
  <template id="tpl-stats-empty">
    <tr>
      <td colspan="{{colspan}}" class="empty-state">
        <svg class="w-12 h-12 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <div class="opacity-75" style="font-weight: var(--font-medium); margin-bottom: var(--space-1);" data-i18n="stats.noData">暂无统计数据</div>
        <div data-i18n="stats.adjustFilter">请调整筛选条件或检查时间范围</div>
      </td>
    </tr>
  </template>

  <!-- 数据行模板 -->
  <template id="tpl-stats-row">
    <tr>
      <td>
        <a href="#" class="config-name channel-link" data-channel-id="{{channelId}}" title="查看该渠道的日志">{{channelName}}</a>
        {{{channelIdBadge}}}
        {{{healthIndicator}}}
      </td>
      <td>{{{modelDisplay}}}</td>
      <td><span class="success-count">{{successCount}}</span></td>
      <td><span class="error-count">{{errorCount}}</span></td>
      <td style="text-align: center;">{{{avgFirstByteTime}}}</td>
      <td style="text-align: right;">{{{rpm}}}</td>
      <td style="text-align: right;">{{{inputTokens}}}</td>
      <td style="text-align: right;">{{{outputTokens}}}</td>
      <td style="text-align: right;">{{{cacheReadTokens}}}</td>
      <td style="text-align: right;">{{{cacheCreationTokens}}}</td>
      <td style="text-align: right;">{{{costText}}}</td>
    </tr>
  </template>

  <!-- 合计行模板 -->
  <template id="tpl-stats-total">
    <tr class="glass-card" style="font-weight: bold;">
      <td colspan="2" class="text-primary" style="text-align: center; font-size: 15px;" data-i18n="stats.total">合计</td>
      <td><span class="success-count">{{successCount}}</span></td>
      <td><span class="error-count">{{errorCount}}</span></td>
      <td style="text-align: center;"></td>
      <td style="text-align: right;">{{{rpm}}}</td>
      <td style="text-align: right;">{{inputTokens}}</td>
      <td style="text-align: right;">{{outputTokens}}</td>
      <td style="text-align: right;"><span style="color: var(--success-600);">{{cacheReadTokens}}</span></td>
      <td style="text-align: right;"><span style="color: var(--primary-600);">{{cacheCreationTokens}}</span></td>
      <td style="text-align: right;"><span style="color: var(--warning-600); font-weight: 600;">{{costText}}</span></td>
    </tr>
  </template>

</body>
</html>
