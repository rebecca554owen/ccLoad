<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/web/favicon.ico">
  <link rel="apple-touch-icon" href="/web/apple-touch-icon.png">
  <link rel="manifest" href="/web/manifest.json">
  <meta name="theme-color" content="#0A84FF">
  <title data-i18n="index.title">概览</title>
  <link rel="stylesheet" href="/web/assets/css/styles.css?v=__VERSION__">
  <script>
    window.__prefetch_summary = fetch('/public/summary?range=today')
      .then(r => r.json())
      .catch(() => null);
  </script>
  <script defer src="/web/assets/locales/zh-CN.js?v=__VERSION__"></script>
  <script defer src="/web/assets/locales/en.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/i18n.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/ui.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/template-engine.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/index.js?v=__VERSION__"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('ccload_theme') || 'light';
      document.documentElement.dataset.theme = savedTheme;
    })();
  </script>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="content-area">
        <div class="page-shell">
        <header class="page-section">
          <div class="glass-card page-header-card">
            <div class="page-header-main">
              <div class="page-header-copy">
                <h1 class="page-title index-hero-title" data-i18n="index.title">概览</h1>
                <p class="page-subtitle index-hero-subtitle" data-i18n="index.subtitle">统计分析</p>
              </div>
            </div>
          </div>
        </header>

        <section class="page-section">
          <div class="time-range-container page-toolbar-card">
            <div class="time-range-selector">
              <button class="time-range-btn active" data-range="today" data-i18n="index.timeRange.today">本日</button>
              <button class="time-range-btn" data-range="yesterday" data-i18n="index.timeRange.yesterday">昨日</button>
              <button class="time-range-btn" data-range="day_before_yesterday" data-i18n="index.timeRange.dayBeforeYesterday">前日</button>
              <button class="time-range-btn" data-range="this_week" data-i18n="index.timeRange.thisWeek">本周</button>
              <button class="time-range-btn" data-range="last_week" data-i18n="index.timeRange.lastWeek">上周</button>
              <button class="time-range-btn" data-range="this_month" data-i18n="index.timeRange.thisMonth">本月</button>
              <button class="time-range-btn" data-range="last_month" data-i18n="index.timeRange.lastMonth">上月</button>
            </div>
          </div>
        </section>

        <section class="page-section">
          <div id="typeStatsGrid" class="cards-grid cards-grid-4 animate-slide-up index-type-grid" style="animation-delay: 0.1s;"></div>
        </section>

        <section class="page-section">
          <div class="cards-grid cards-grid-4 animate-slide-up index-summary-row" style="animation-delay: 0.2s;">
            <div class="summary-card summary-card-success">
              <div class="summary-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 6L9 17l-5-5"/>
                </svg>
              </div>
              <div class="summary-content">
                <div class="summary-value"><span class="metric-success" id="success-requests">--</span>/<span class="metric-error" id="error-requests">--</span> <span class="summary-inline-meta">(<span id="success-rate">--</span>)</span></div>
                <div class="summary-label" data-i18n="index.metrics.successFailed">成功/失败 (成功率)</div>
              </div>
            </div>
            <div class="summary-card summary-card-info" title="每分钟请求数">
              <div class="summary-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M12 6v6l4 2"/>
                </svg>
              </div>
              <div class="summary-content">
                <div class="summary-value" id="total-rpm">--</div>
                <div class="summary-label" data-i18n="index.metrics.rpm">RPM(峰值 平均 最近)</div>
              </div>
            </div>
          </div>
        </section>

        <section class="page-section">
            <div class="glass-card animate-slide-up page-content-card index-api-card" style="animation-delay: 0.3s;">
              <h3 class="text-xl font-semibold mb-6">
                <svg class="inline-block w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2-2v16z"/>
                </svg>
                <span data-i18n="index.apiSection">API 接口</span>
              </h3>
              <div class="index-api-list">
                <div class="index-api-item">
                  <div class="index-api-method is-post">POST</div>
                  <div class="index-api-endpoint">/v1/messages</div>
                  <div class="index-api-desc" data-i18n="index.apiClaudeDesc">Claude API 透明代理</div>
                </div>
                <div class="index-api-item">
                  <div class="index-api-method is-post">POST</div>
                  <div class="index-api-endpoint">/v1/responses</div>
                  <div class="index-api-desc" data-i18n="index.apiCodexDesc">Codex API 透明代理</div>
                </div>
                <div class="index-api-item">
                  <div class="index-api-method is-post">POST</div>
                  <div class="index-api-endpoint">/v1beta</div>
                  <div class="index-api-desc" data-i18n="index.apiGeminiDesc">Gemini 透明代理</div>
                </div>
                <div class="index-api-item">
                  <div class="index-api-method is-get">GET</div>
                  <div class="index-api-endpoint">/public/summary</div>
                  <div class="index-api-desc" data-i18n="index.apiSummaryDesc">公开统计数据</div>
                </div>
              </div>
              <div class="index-api-tip">
                <div class="index-api-tip-title" data-i18n="common.info">提示</div>
                <div class="index-api-tip-body" data-i18n="index.apiTip">
                  管理功能需要登录访问，代理服务公开使用
                </div>
              </div>
            </div>
        </section>
        </div>
      </div>
    </main>
  </div>

  <template id="tpl-type-stat-card">
    <div class="channel-card" id="type-{{type}}-card">
      <div class="channel-card-header">
        <div class="channel-card-title">
          <div class="channel-icon" style="background: {{iconBackground}};">
            {{{iconSvg}}}
          </div>
          <span>{{title}}</span>
        </div>
        <div class="channel-cost">
          <span class="cost-label" data-i18n="common.cost">成本</span>
          <span class="cost-value" id="type-{{type}}-cost">$0.00</span>
        </div>
      </div>
      <div class="channel-metrics">
        <div class="metric-item">
          <div class="metric-value metric-total" id="type-{{type}}-requests">0</div>
          <div class="metric-label" data-i18n="index.metrics.totalRequests">总请求</div>
        </div>
        <div class="metric-item">
          <div class="metric-value metric-success" id="type-{{type}}-success">0</div>
          <div class="metric-label" data-i18n="index.metrics.success">成功</div>
        </div>
        <div class="metric-item">
          <div class="metric-value metric-error" id="type-{{type}}-error">0</div>
          <div class="metric-label" data-i18n="index.metrics.failed">失败</div>
        </div>
        <div class="metric-item">
          <div class="metric-value metric-rate" id="type-{{type}}-rate">0.0%</div>
          <div class="metric-label" data-i18n="index.metrics.successRate">成功率</div>
        </div>
      </div>
      <div class="token-stats">
        <div class="token-item">
          <span class="token-label" data-i18n="common.input">输入</span>
          <span class="token-value" id="type-{{type}}-input">0</span>
        </div>
        <div class="token-item">
          <span class="token-label" data-i18n="common.output">输出</span>
          <span class="token-value" id="type-{{type}}-output">0</span>
        </div>
        <div class="token-item">
          <span class="token-label" data-i18n="common.cacheRead">缓存读</span>
          <span class="token-value token-cache" id="type-{{type}}-cache-read">0</span>
        </div>
        {{{cacheCreateHtml}}}
      </div>
    </div>
  </template>
</body>
</html>
